apiVersion: apps/v1
kind: Deployment

metadata:
  name: fuzzyneurooptimizer

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fuzzy

  template:
    metadata:
      labels:
        app: fuzzy

    spec:
      containers:
      - name: fuzzy

        image: parth22420166/fuzzyneurooptimizer:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"
